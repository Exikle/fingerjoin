name: Helm Chart CI

on:
  push:
    branches: [master]
    paths:
      - 'chart/**'
      - '.github/workflows/helm.yml'
  pull_request:
    branches: [master]
    paths:
      - 'chart/**'
      - '.github/workflows/helm.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  helm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Add chart repo
        run: |
          helm repo add bjw-s-labs https://bjw-s-labs.github.io/helm-charts/ || true
          helm repo update

      - name: Log in to GH Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build dependencies
        run: helm dependency build chart/fingerjoin

      - name: Package chart
        run: |
          helm package chart/fingerjoin --destination /tmp/charts

      - name: Push chart
        if: github.event_name != 'pull_request'
        run: |
          helm push /tmp/charts/fingerjoin-*.tgz oci://ghcr.io/${{ github.repository }}/fingerjoin

      - name: Get version
        if: github.event_name != 'pull_request'
        run: echo "version=$(helm show chart /tmp/charts/fingerjoin-*.tgz | grep '^version:' | awk '{print $2}')" >> $GITHUB_OUTPUT
        id: version

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign chart
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}/fingerjoin:${{ steps.version.outputs.version }}
        env:
          COSIGN_FULFILLMENT_CHALLENGE: true
          COSIGN_EXPERIMENTAL: 1