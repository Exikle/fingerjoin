name: Helm Chart CI

on:
  push:
    branches: [master]
    paths:
      - 'chart/**'
      - '.github/workflows/helm.yml'
  pull_request:
    branches: [master]
    paths:
      - 'chart/**'
      - '.github/workflows/helm.yml'

jobs:
  helm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase registry
        run: echo "HELM_REGISTRY=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/charts" >> $GITHUB_ENV

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: latest

      - name: Add chart repo
        run: |
          helm repo add bjw-s-labs https://bjw-s-labs.github.io/helm-charts/ || true
          helm repo update

      - name: Log in to GH Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image repository
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          sed -i "s|repository: ghcr.io/.*/fingerjoin|repository: ghcr.io/${OWNER}/fingerjoin|" chart/fingerjoin/values.yaml

      - name: Build dependencies
        run: helm dependency build chart/fingerjoin

      - name: Package chart
        run: |
          mkdir -p dist
          helm package chart/fingerjoin --destination ./dist

      - name: Get chart version
        id: version
        run: echo "VERSION=$(grep '^version:' chart/fingerjoin/Chart.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Push chart
        if: github.event_name != 'pull_request'
        run: |
          helm push ./dist/*.tgz oci://${{ env.HELM_REGISTRY }}

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign chart
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes ${{ env.HELM_REGISTRY }}/fingerjoin:${{ steps.version.outputs.VERSION }}
        env:
          COSIGN_FULFILLMENT_CHALLENGE: true
          COSIGN_EXPERIMENTAL: 1