name: Helm Chart CI

on:
  push:
    branches: [master]
    paths:
      - 'chart/**'
      - '.github/workflows/helm.yml'
  pull_request:
    branches: [master]
    paths:
      - 'chart/**'
      - '.github/workflows/helm.yml'

env:
  CARGO_TERM_COLOR: always
  HELM_REGISTRY: ghcr.io/${{ github.repository_owner }}/charts
  HELM_IMAGE_NAME: ${{ github.event.repository.name }}

jobs:
  helm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: latest

      - name: Add chart repo
        run: |
          helm repo add bjw-s-labs https://bjw-s-labs.github.io/helm-charts/ || true
          helm repo update

      - name: Log in to GH Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HELM_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build dependencies
        run: helm dependency build chart/fingerjoin

      - name: Package chart
        run: |
          mkdir -p dist
          helm package chart/fingerjoin --destination ./dist

      - name: Get chart version
        id: version
        run: echo "VERSION=$(grep '^version:' chart/fingerjoin/Chart.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Push chart
        if: github.event_name != 'pull_request'
        run: |
          helm push ./dist/*.tgz oci://${{ env.HELM_REGISTRY }}/${{ env.HELM_IMAGE_NAME }} | tee push_output.txt

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Get chart digest
        if: github.event_name != 'pull_request'
        id: digest
        run: |
          DIGEST=$(helm registry digest oci://${{ env.HELM_REGISTRY }}/${{ env.HELM_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }} 2>/dev/null | grep -o 'sha256:[a-f0-9]*')
          echo "DIGEST=$DIGEST" >> $GITHUB_OUTPUT

      - name: Sign chart
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes oci://${{ env.HELM_REGISTRY }}/${{ env.HELM_IMAGE_NAME }}@${{ steps.digest.outputs.DIGEST }}
        env:
          COSIGN_FULFILLMENT_CHALLENGE: true
          COSIGN_EXPERIMENTAL: 1